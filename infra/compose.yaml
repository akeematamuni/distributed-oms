services:
  postgres:
    image: postgres:16
    container_name: doms_postgres
    env_file: ["../.env"]
    ports: ["5432:5432"]
    volumes:
      - doms_postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: doms_redis
    ports: ["6379:6379"]
    # volumes: ["doms_redis_data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.8
    container_name: doms_zookeeper
    env_file: ["../.env"]
    ports: ["2181:2181"]
    # volumes:
    #   - doms_zk_data:/var/lib/zookeeper/data
    #   - doms_zk_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.7.8
    container_name: doms_kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    env_file: ["../.env"]
    ports: ["9092:9092", "29092:29092"]
    # volumes: ["doms_kafka_data:/var/lib/kafka/data"]
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 25s
      timeout: 15s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.7.8
    container_name: doms_kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    volumes: ["./kafka/init-topics.sh:/usr/local/bin/init-topics.sh"]
    entrypoint: ["/bin/sh", "/usr/local/bin/init-topics.sh"]

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: doms_kafka_ui
    depends_on:
      kafka:
        condition: service_healthy
    env_file: ["../.env"]
    ports: ["8080:8080"]

volumes:
  doms_postgres_data:
  # doms_redis_data:
  # doms_zk_data:
  # doms_zk_log:
  # doms_kafka_data:
